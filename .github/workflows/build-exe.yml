name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller pandas openpyxl

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "ArchivoActualizado" aggiorna_clienti_gui.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArchivoActualizado-Windows
          path: dist/ArchivoActualizado.exe
